<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RM Warzone Lobby</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#000,#1a0000);
  color:white;
  text-align:center;
  overflow:hidden;
}

/* LOGO */
#logo{
  font-size:45px;
  margin-top:50px;
  color:red;
  text-shadow:0 0 20px red,0 0 40px orange,0 0 60px darkred;
}

/* BUTTON */
button{
  padding:15px 30px;
  margin-top:30px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  cursor:pointer;
}

button:hover{
  background:darkred;
}

/* LOADING */
#loading{
  display:none;
  margin-top:25px;
  font-size:20px;
}

/* TEAM */
#team{
  display:none;
  margin-top:20px;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:10px;
  display:inline-block;
}

/* COUNTDOWN */
#countdown{
  display:none;
  font-size:40px;
  margin-top:20px;
  color:yellow;
}
</style>
</head>

<body>

<div id="logo">🔥 RM WARZONE 🔥</div>

<button onclick="playSound(); startMatch()">▶ PLAY</button>

<div id="loading">🔍 Finding Players...</div>

<div id="team">
  <h3>Team (6 Players)</h3>
  <p>Rishi</p>
  <p>Player45</p>
  <p>SniperX</p>
  <p>Ghost</p>
  <p>Warrior</p>
  <p>Shadow</p>
</div>

<div id="countdown"></div>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

<script>
function playSound(){
  document.getElementById("clickSound").play();
}

function startMatch(){
  document.querySelector("button").style.display="none";
  document.getElementById("loading").style.display="block";

  // STEP 1
  setTimeout(()=>{
    document.getElementById("loading").innerText="👥 Players Found!";
    document.getElementById("team").style.display="block";
  },2000);

  // STEP 2
  setTimeout(()=>{
    document.getElementById("loading").innerText="⏳ Match Starting...";
  },4000);

  // STEP 3 COUNTDOWN
  setTimeout(()=>{
    document.getElementById("countdown").style.display="block";
    let i=3;
    let interval=setInterval(()=>{
      document.getElementById("countdown").innerText=i;
      i--;
      if(i<0){
        clearInterval(interval);
        window.location.href="rm-warzone.html";
      }
    },1000);
  },5000);
}
</script>

</body>
</html>
