<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RM Warzone Lobby</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#000,#1a0000);
  color:white;
  text-align:center;
}

/* LOGO */
#logo{
  font-size:40px;
  margin-top:50px;
  color:red;
  text-shadow:0 0 30px red;
}

/* BUTTON */
button{
  padding:15px 30px;
  margin-top:30px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  cursor:pointer;
}

button:hover{
  background:darkred;
}

/* LOADING */
#loading{
  display:none;
  margin-top:30px;
  font-size:18px;
}

/* TEAM BOX */
#team{
  display:none;
  margin-top:20px;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:10px;
  display:inline-block;
}
</style>
</head>

<body>

<div id="logo">🔥 RM WARZONE 🔥</div>

<button onclick="startMatch()">▶ PLAY</button>

<div id="loading">🔍 Finding Players...</div>

<div id="team">
  <h3>Team (6 Players)</h3>
  <p>Rishi</p>
  <p>Player45</p>
  <p>SniperX</p>
  <p>Ghost</p>
  <p>Warrior</p>
  <p>Shadow</p>
</div>

<script>
function startMatch(){
  document.querySelector("button").style.display="none";
  document.getElementById("loading").style.display="block";

  setTimeout(()=>{
    document.getElementById("loading").innerText="👥 Players Found!";
    document.getElementById("team").style.display="block";
  },2000);

  setTimeout(()=>{
    document.getElementById("loading").innerText="⏳ Match Starting...";
  },4000);

  setTimeout(()=>{
    window.location.href="rm-warzone.html";
  },6000);
}
</script>

</body>
</html>
