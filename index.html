<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RM Warzone Login</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://wallpaperaccess.com/full/31193.jpg') no-repeat center/cover;
}

/* OVERLAY */
#overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* CENTER */
#loginBox{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
}

#logo{
  font-size:40px;
  margin-bottom:30px;
  color:gold;
  text-shadow:0 0 20px gold;
}

button{
  display:block;
  width:250px;
  padding:12px;
  margin:10px auto;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.google{ background:#4285F4; color:white; }
.guest{ background:white; }
</style>
</head>

<body>

<div id="overlay"></div>

<div id="loginBox">
  <div id="logo">🔥 RM WARZONE 🔥</div>

  <button class="google" onclick="googleLogin()">Sign in with Google</button>
  <button class="guest" onclick="guestLogin()">Guest</button>
</div>

<script>
// 🔥 FIREBASE CONFIG (tera wala same)
const firebaseConfig = {
  apiKey: "AIzaSyArnIKZ8odykhlwMDBjXVOyTOpCXXFnNBk",
  authDomain: "rmuniverse120824.firebaseapp.com",
  projectId: "rmuniverse120824",
  appId: "1:338852799104:web:1dc2b2fb99e84db9503c65"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// GOOGLE LOGIN
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
  .then(()=>{
    window.location.href="lobby.html";
  })
  .catch(e=>alert(e.message));
}

// GUEST LOGIN
function guestLogin(){
  auth.signInAnonymously()
  .then(()=>{
    window.location.href="lobby.html";
  })
  .catch(e=>alert(e.message));
}
</script>

</body>
</html>
