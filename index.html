<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RM Warzone Login</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('logo.png') no-repeat center/cover;
}

#overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

#box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
}

input{
  display:block;
  width:250px;
  padding:10px;
  margin:10px auto;
  border-radius:8px;
  border:none;
}

button{
  display:block;
  width:260px;
  padding:12px;
  margin:10px auto;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.google{background:#4285F4;color:white;}
</style>
</head>

<body>

<div id="overlay"></div>

<div id="box">
  <img src="logo.png" style="width:220px;"><br>

  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password (min 6)">

  <button onclick="signup()">Sign Up</button>
  <button class="google" onclick="googleLogin()">Google Login</button>
  <button onclick="guestLogin()">Guest Login</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyArnIKZ8odykhlwMDBjXVOyTOpCXXFnNBk",
  authDomain: "rmuniverse120824.firebaseapp.com",
  projectId: "rmuniverse120824",
  appId: "1:338852799104:web:1dc2b2fb99e84db9503c65"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function signup(){
  let u=username.value;
  let e=email.value;
  let p=password.value;

  if(p.length<6){
    alert("Password must be 6+");
    return;
  }

  db.collection("users").where("username","==",u).get()
  .then(snap=>{
    if(!snap.empty){
      alert("Username already taken ❌");
    }else{
      auth.createUserWithEmailAndPassword(e,p)
      .then(res=>{
        db.collection("users").doc(res.user.uid).set({
          username:u,
          coins:500,
          gems:10
        });
        window.location.href="lobby.html";
      });
    }
  });
}

function googleLogin(){
  let provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
  .then(res=>{
    let uid=res.user.uid;

    db.collection("users").doc(uid).get().then(doc=>{
      if(!doc.exists){
        db.collection("users").doc(uid).set({
          username:"Player"+Math.floor(Math.random()*1000),
          coins:500,
          gems:10
        });
      }
      window.location.href="lobby.html";
    });
  });
}

function guestLogin(){
  auth.signInAnonymously().then(res=>{
    let uid=res.user.uid;
    db.collection("users").doc(uid).set({
      username:"Guest"+Math.floor(Math.random()*1000),
      coins:200,
      gems:0
    });
    window.location.href="lobby.html";
  });
}
</script>

</body>
</html>
