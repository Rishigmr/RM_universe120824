<!DOCTYPE html>
<html>
<head>
<title>RM WARZONE</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: url("bg.jpg") no-repeat center center;
  background-size: cover;
  color:white;
}

/* dark overlay */
body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

/* top bar */
.top-bar{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  background:rgba(0,0,0,0.6);
}

.profile{
  display:flex;
  align-items:center;
}

.profile img{
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

/* left menu */
.menu{
  position:absolute;
  top:100px;
  left:20px;
}

.menu button{
  display:block;
  margin:10px 0;
  padding:10px 20px;
  background:rgba(0,0,0,0.7);
  color:white;
  border:none;
  cursor:pointer;
}

/* center character */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.center img{
  width:200px;
}

/* start button */
.start-btn{
  position:absolute;
  bottom:40px;
  right:40px;
  padding:15px 40px;
  background:gold;
  color:black;
  font-size:20px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="top-bar">
  <div class="profile">
    <img src="logo.png">
    <div>
      <div>RISHI</div>
      <div>Coins: 1000 | Gems: 10</div>
    </div>
  </div>
</div>

<div class="menu">
  <button>SHOP</button>
  <button>FRIENDS</button>
  <button>SETTINGS</button>
</div>

<div class="center">
  <img src="plane.png">
  <h2>READY FOR BATTLE</h2>
</div>

<button class="start-btn" onclick="startGame()">START</button>

<script>
function startGame(){
  window.location.href="rm-warzone.html";
}
</script>

</body>
</html>
