<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RM Warzone Lobby</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e') no-repeat center/cover;
}

/* DARK OVERLAY */
#overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* TOP BAR */
#top{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#profile{
  display:flex;
  align-items:center;
}

#profile img{
  width:50px;
  border-radius:50%;
  margin-right:10px;
}

#money{
  background:rgba(0,0,0,0.6);
  padding:10px 20px;
  border-radius:10px;
}

/* LEFT MENU */
#menu{
  position:absolute;
  left:20px;
  top:120px;
}

.menuBtn{
  margin:12px 0;
  padding:12px 20px;
  background:rgba(0,0,0,0.7);
  border-radius:10px;
  cursor:pointer;
  width:150px;
  text-align:center;
}

/* CHARACTER */
#character{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
}

#character img{
  height:420px;
}

/* RIGHT PANEL */
#right{
  position:absolute;
  right:20px;
  top:120px;
}

#right img{
  width:220px;
  border-radius:10px;
}

/* START BUTTON */
#start{
  position:absolute;
  bottom:40px;
  right:40px;
  padding:15px 50px;
  font-size:22px;
  background:gold;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* FRIENDS PANEL */
#friends{
  position:absolute;
  right:10px;
  top:200px;
}

.friend{
  margin:5px;
  padding:8px;
  background:black;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="overlay"></div>

<!-- TOP -->
<div id="top">
  <div id="profile">
    <img src="https://i.imgur.com/6X12UGp.png">
    <div id="name">Loading...</div>
  </div>

  <div id="money">🪙 0 | 💎 0</div>
</div>

<!-- LEFT MENU -->
<div id="menu">
  <div class="menuBtn">🛒 STORE</div>
  <div class="menuBtn">🎯 LUCK</div>
  <div class="menuBtn">📋 MISSIONS</div>
  <div class="menuBtn">🎉 EVENTS</div>
</div>

<!-- CHARACTER -->
<div id="character">
  <img src="https://i.imgur.com/6X12UGp.png">
</div>

<!-- RIGHT -->
<div id="right">
  <img src="https://i.imgur.com/8QfQw6M.png">
</div>

<!-- FRIENDS -->
<div id="friends">
  <div class="friend">👤 Player1</div>
  <div class="friend">👤 Player2</div>
  <div class="friend">👤 Player3</div>
</div>

<!-- START -->
<button id="start" onclick="start()">START</button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyArnIKZ8odykhlwMDBjXVOyTOpCXXFnNBk",
  authDomain: "rmuniverse120824.firebaseapp.com",
  projectId: "rmuniverse120824",
  appId: "1:338852799104:web:1dc2b2fb99e84db9503c65"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

auth.onAuthStateChanged(user=>{
  if(user){
    db.collection("users").doc(user.uid).get()
    .then(doc=>{
      let d=doc.data();
      name.innerText=d.username;
      money.innerText="🪙 "+d.coins+" | 💎 "+d.gems;
    });
  }
});

function start(){
  window.location.href="rm-warzone.html";
}
</script>

</body>
</html>
