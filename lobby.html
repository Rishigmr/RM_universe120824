<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lobby</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('logo.png') no-repeat center/cover;
  color:white;
}

#top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,0,0,0.6);
}

#menu{
  position:absolute;
  left:20px;
  top:120px;
}

.btn{
  margin:10px;
  padding:10px;
  background:black;
  border-radius:8px;
  cursor:pointer;
}

#play{
  position:absolute;
  bottom:40px;
  right:40px;
  background:gold;
  padding:15px 40px;
  font-size:20px;
}
</style>
</head>

<body>

<div id="top">
  <div id="name">Loading...</div>
  <div id="money">🪙 0 | 💎 0</div>
</div>

<div id="menu">
  <div class="btn">🛒 SHOP</div>
  <div class="btn">👥 FRIENDS</div>
  <div class="btn">⚙ SETTINGS</div>
</div>

<button id="play" onclick="start()">START</button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyArnIKZ8odykhlwMDBjXVOyTOpCXXFnNBk",
  authDomain: "rmuniverse120824.firebaseapp.com",
  projectId: "rmuniverse120824",
  appId: "1:338852799104:web:1dc2b2fb99e84db9503c65"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

auth.onAuthStateChanged(user=>{
  if(user){
    db.collection("users").doc(user.uid).get()
    .then(doc=>{
      let d=doc.data();
      name.innerText="👤 "+d.username;
      money.innerText="🪙 "+d.coins+" | 💎 "+d.gems;
    });
  }
});

function start(){
  window.location.href="rm-warzone.html";
}
</script>

</body>
</html>
