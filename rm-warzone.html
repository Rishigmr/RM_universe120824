<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RM Warzone</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

/* BACKGROUND */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom,#000000,#220000);
  z-index:-1;
}

/* LOGO */
#logo{
  font-size:40px;
  text-align:center;
  margin-top:40px;
  color:red;
  text-shadow:0 0 30px red;
}

/* MENU */
#menu{
  text-align:center;
  margin-top:40px;
}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  background:darkred;
}

/* GAME UI */
#gameUI{
  display:none;
}

.box{
  position:absolute;
  background:rgba(0,0,0,0.7);
  padding:10px 20px;
  border-radius:10px;
  border:1px solid red;
}

#score{ top:10px; left:10px; }
#life{ top:10px; right:10px; }

canvas{
  display:block;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- LOGO -->
<div id="logo">🔥 RM WARZONE 🔥</div>

<!-- MENU -->
<div id="menu">
  <button onclick="startGame()">▶ PLAY</button>
  <button disabled>👥 Play With Friends (soon)</button>
  <button disabled>🌐 Create Room (soon)</button>
</div>

<!-- GAME -->
<div id="gameUI">
  <div id="score" class="box">Score: 0</div>
  <div id="life" class="box">Life: 3</div>
  <canvas id="game"></canvas>
</div>

<script>
let c,ctx;
let player,bullets,enemies;
let scoreVal=0,lifeVal=3;

function startGame(){
  menu.style.display="none";
  logo.style.display="none";
  gameUI.style.display="block";

  c=document.getElementById("game");
  ctx=c.getContext("2d");

  c.width=window.innerWidth;
  c.height=window.innerHeight;

  player={x:200,y:200,size:20};
  bullets=[];
  enemies=[];
  scoreVal=0;
  lifeVal=3;

  window.onmousemove=(e)=>{
    player.x=e.clientX;
    player.y=e.clientY;
  };

  window.onclick=()=>{
    bullets.push({x:player.x+10,y:player.y});
  };

  setInterval(()=>{
    enemies.push({
      x:Math.random()*c.width,
      y:0,
      size:20
    });
  },1000);

  update();
}

function update(){
  ctx.clearRect(0,0,c.width,c.height);

  // PLAYER
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x,player.y,20,20);

  // BULLETS
  ctx.fillStyle="yellow";
  bullets.forEach((b,i)=>{
    b.y-=6;
    ctx.fillRect(b.x,b.y,5,10);
  });

  // ENEMIES
  enemies.forEach((e,i)=>{
    e.y+=3;
    ctx.fillStyle="red";
    ctx.fillRect(e.x,e.y,20,20);

    if(Math.abs(player.x-e.x)<20 && Math.abs(player.y-e.y)<20){
      lifeVal--;
      enemies.splice(i,1);
    }

    bullets.forEach((b,bi)=>{
      if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
        enemies.splice(i,1);
        bullets.splice(bi,1);
        scoreVal++;
      }
    });
  });

  // UI UPDATE
  document.getElementById("score").innerText="Score: "+scoreVal;
  document.getElementById("life").innerText="Life: "+lifeVal;

  if(lifeVal<=0){
    alert("💀 GAME OVER");
    location.reload();
  }

  requestAnimationFrame(update);
}
</script>

</body>
</html>
