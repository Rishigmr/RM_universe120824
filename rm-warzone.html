<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RM Warzone</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:linear-gradient(#000,#330000);
}

/* UI */
#hp,#coins{
  position:absolute;
  padding:10px 15px;
  background:rgba(0,0,0,0.6);
  color:white;
  border-radius:10px;
}

#hp{ top:10px; left:10px; }
#coins{ top:50px; left:10px; }

/* HEAL BUTTON */
#heal{
  position:absolute;
  bottom:30px;
  left:30px;
  padding:12px 20px;
  background:green;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* GAME OVER */
#over{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:black;
  color:white;
  padding:20px;
}
</style>
</head>

<body>

<div id="hp">❤️ HP: 1000</div>
<div id="coins">🪙 Coins: 0</div>

<button id="heal" onclick="heal()">🧪 Use Chemical</button>

<div id="over">
  <h2>GAME OVER</h2>
  <button onclick="location.reload()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
let c=document.getElementById("game");
let ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let player={x:200,y:500};
let bullets=[];
let enemies=[];

let hp=1000;
let coins=100;

// SHOOT
setInterval(()=>{
  bullets.push({x:player.x+10,y:player.y});
},300);

// MOVE
window.onmousemove=(e)=>{
  player.x=e.clientX;
};

// ENEMY SPAWN
setInterval(()=>{
  enemies.push({
    x:Math.random()*c.width,
    y:0
  });
},1000);

function update(){
  ctx.clearRect(0,0,c.width,c.height);

  // PLAYER
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x,player.y,40,40);

  // BULLETS
  ctx.fillStyle="yellow";
  bullets.forEach((b,i)=>{
    b.y-=8;
    ctx.fillRect(b.x,b.y,5,10);
  });

  // ENEMIES
  enemies.forEach((e,i)=>{
    e.y+=3;
    ctx.fillStyle="red";
    ctx.fillRect(e.x,e.y,30,30);

    // DAMAGE
    if(Math.abs(player.x-e.x)<30 && Math.abs(player.y-e.y)<30){
      hp-=50;
      enemies.splice(i,1);
    }

    // KILL
    bullets.forEach((b,bi)=>{
      if(Math.abs(b.x-e.x)<25 && Math.abs(b.y-e.y)<25){
        enemies.splice(i,1);
        bullets.splice(bi,1);
        coins+=10;
      }
    });
  });

  // UPDATE UI
  document.getElementById("hp").innerText="❤️ HP: "+hp;
  document.getElementById("coins").innerText="🪙 Coins: "+coins;

  // GAME OVER
  if(hp<=0){
    document.getElementById("over").style.display="block";
    return;
  }

  requestAnimationFrame(update);
}

// HEAL SYSTEM
function heal(){
  if(coins>=50){
    coins-=50;
    hp+=200;

    if(hp>1000) hp=1000;
  }else{
    alert("Not enough coins ❌");
  }
}

update();
</script>

</body>
</html>
