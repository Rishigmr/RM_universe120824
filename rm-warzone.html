<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RM Warzone</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle,#000,#1a0000);
}

h1{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:red;
}

#score{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}

#life{
  position:absolute;
  top:30px;
  left:10px;
  color:white;
}
</style>
</head>

<body>

<h1>🔥 RM WARZONE 🔥</h1>
<div id="score">Score: 0</div>
<div id="life">Life: 3</div>

<canvas id="game"></canvas>

<script>
let c=document.getElementById("game");
let ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let player={x:200,y:200,size:20};
let bullets=[];
let enemies=[];
let score=0;
let life=3;

// SHOOT
window.onclick=()=>{
  bullets.push({x:player.x+10,y:player.y});
};

// MOVE PLAYER
window.onmousemove=(e)=>{
  player.x=e.clientX;
  player.y=e.clientY;
};

// SPAWN ENEMY
setInterval(()=>{
  enemies.push({
    x:Math.random()*c.width,
    y:0,
    size:20
  });
},1000);

// GAME LOOP
function update(){
  ctx.clearRect(0,0,c.width,c.height);

  // PLAYER
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x,player.y,player.size,player.size);

  // BULLETS
  ctx.fillStyle="yellow";
  bullets.forEach((b,i)=>{
    b.y-=5;
    ctx.fillRect(b.x,b.y,5,10);
  });

  // ENEMIES
  enemies.forEach((e,i)=>{
    e.y+=2;
    ctx.fillStyle="red";
    ctx.fillRect(e.x,e.y,e.size,e.size);

    // COLLISION WITH PLAYER
    if(Math.abs(player.x-e.x)<20 && Math.abs(player.y-e.y)<20){
      life--;
      enemies.splice(i,1);
    }

    // BULLET HIT
    bullets.forEach((b,bi)=>{
      if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
        enemies.splice(i,1);
        bullets.splice(bi,1);
        score++;
      }
    });
  });

  // UPDATE UI
  document.getElementById("score").innerText="Score: "+score;
  document.getElementById("life").innerText="Life: "+life;

  // GAME OVER
  if(life<=0){
    alert("💀 GAME OVER");
    location.reload();
  }

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
