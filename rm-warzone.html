<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RM Warzone</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:linear-gradient(#000,#220000);
}

/* UI */
#score,#life,#coins{
  position:absolute;
  background:rgba(0,0,0,0.6);
  padding:8px 15px;
  border-radius:10px;
  color:white;
}

#score{ top:10px; left:10px; }
#life{ top:10px; right:10px; }
#coins{ top:40px; left:10px; }

#gameOver{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:black;
  padding:30px;
  color:white;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>
<div id="life">Life: 3</div>
<div id="coins">Coins: 0</div>

<div id="gameOver">
  <h2>💀 GAME OVER</h2>
  <button onclick="location.reload()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
let c=document.getElementById("game");
let ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let player={x:200,y:500,size:40};
let bullets=[];
let enemies=[];
let coinsArr=[];

let score=0;
let life=3;
let coins=0;

// AUTO SHOOT
setInterval(()=>{
  bullets.push({x:player.x+15,y:player.y});
},300);

// MOVE
window.onmousemove=(e)=>{
  player.x=e.clientX;
};

// ENEMY SPAWN
setInterval(()=>{
  enemies.push({
    x:Math.random()*c.width,
    y:0,
    size:30
  });
},1000);

// COIN SPAWN
setInterval(()=>{
  coinsArr.push({
    x:Math.random()*c.width,
    y:0,
    size:15
  });
},2000);

function update(){
  ctx.clearRect(0,0,c.width,c.height);

  // PLAYER (PLANE)
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x,player.y,40,40);

  // BULLETS
  ctx.fillStyle="yellow";
  bullets.forEach((b,i)=>{
    b.y-=8;
    ctx.fillRect(b.x,b.y,5,10);
  });

  // ENEMIES
  enemies.forEach((e,i)=>{
    e.y+=3;
    ctx.fillStyle="red";
    ctx.fillRect(e.x,e.y,30,30);

    // HIT PLAYER
    if(Math.abs(player.x-e.x)<30 && Math.abs(player.y-e.y)<30){
      life--;
      enemies.splice(i,1);
    }

    // BULLET HIT
    bullets.forEach((b,bi)=>{
      if(Math.abs(b.x-e.x)<25 && Math.abs(b.y-e.y)<25){
        enemies.splice(i,1);
        bullets.splice(bi,1);
        score+=10;
      }
    });
  });

  // COINS
  coinsArr.forEach((co,i)=>{
    co.y+=3;
    ctx.fillStyle="gold";
    ctx.fillRect(co.x,co.y,15,15);

    if(Math.abs(player.x-co.x)<30 && Math.abs(player.y-co.y)<30){
      coins+=10;
      coinsArr.splice(i,1);
    }
  });

  // UPDATE UI
  document.getElementById("score").innerText="Score: "+score;
  document.getElementById("life").innerText="Life: "+life;
  document.getElementById("coins").innerText="Coins: "+coins;

  // GAME OVER
  if(life<=0){
    document.getElementById("gameOver").style.display="block";
    return;
  }

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
