<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RM Warzone</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle,#000,#220000);
}

/* UI */
#hpBar{
  position:absolute;
  top:10px;
  left:10px;
  width:200px;
  height:20px;
  background:red;
}

#hpFill{
  height:100%;
  background:lime;
  width:100%;
}

#coins{
  position:absolute;
  top:40px;
  left:10px;
  color:white;
}

/* SKILLS */
.skill{
  position:absolute;
  bottom:20px;
  padding:10px;
  background:black;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

#s1{left:20px;}
#s2{left:120px;}
#s3{left:220px;}
#s4{left:320px;}

#over{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  background:black;
  padding:20px;
}
</style>
</head>

<body>

<div id="hpBar"><div id="hpFill"></div></div>
<div id="coins">Coins: 0</div>

<div id="s1" class="skill" onclick="blast()">🔥</div>
<div id="s2" class="skill" onclick="shield()">🛡</div>
<div id="s3" class="skill" onclick="speed()">⚡</div>
<div id="s4" class="skill" onclick="rage()">💀</div>

<div id="over">
<h2>GAME OVER</h2>
<button onclick="location.reload()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
let c=document.getElementById("game");
let ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let player={x:200,y:500,size:40};
let bullets=[];
let enemies=[];
let explosions=[];

let hp=1000;
let maxHp=1000;
let coins=100;

let speedBoost=false;
let shieldOn=false;
let rageOn=false;

// SHOOT
setInterval(()=>{
  bullets.push({x:player.x+15,y:player.y});
},300);

// MOVE
window.onmousemove=(e)=>{
  player.x=e.clientX;
};

// ENEMY
setInterval(()=>{
  enemies.push({x:Math.random()*c.width,y:0});
},1000);

function update(){
  ctx.clearRect(0,0,c.width,c.height);

  // PLAYER (GLOW)
  ctx.shadowBlur=20;
  ctx.shadowColor="cyan";
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x,player.y,40,40);
  ctx.shadowBlur=0;

  // BULLETS
  ctx.fillStyle="yellow";
  bullets.forEach((b,i)=>{
    b.y-=8;
    ctx.fillRect(b.x,b.y,5,10);
  });

  // ENEMIES
  enemies.forEach((e,i)=>{
    e.y+=3;
    ctx.fillStyle="red";
    ctx.fillRect(e.x,e.y,30,30);

    // DAMAGE
    if(Math.abs(player.x-e.x)<30 && Math.abs(player.y-e.y)<30){
      hp -= shieldOn ? 10 : 50;
      enemies.splice(i,1);
    }

    // KILL
    bullets.forEach((b,bi)=>{
      if(Math.abs(b.x-e.x)<25 && Math.abs(b.y-e.y)<25){
        enemies.splice(i,1);
        bullets.splice(bi,1);
        coins += rageOn ? 20 : 10;

        explosions.push({x:e.x,y:e.y,size:20});
      }
    });
  });

  // EXPLOSION
  explosions.forEach((ex,i)=>{
    ex.size+=2;
    ctx.fillStyle="orange";
    ctx.fillRect(ex.x,ex.y,ex.size,ex.size);
    if(ex.size>40) explosions.splice(i,1);
  });

  // HP BAR
  document.getElementById("hpFill").style.width=(hp/maxHp*100)+"%";
  document.getElementById("coins").innerText="Coins: "+coins;

  if(hp<=0){
    document.getElementById("over").style.display="block";
    return;
  }

  requestAnimationFrame(update);
}

// SKILLS
function blast(){
  enemies=[];
}

function shield(){
  shieldOn=true;
  setTimeout(()=>shieldOn=false,5000);
}

function speed(){
  speedBoost=true;
  setTimeout(()=>speedBoost=false,5000);
}

function rage(){
  rageOn=true;
  setTimeout(()=>rageOn=false,5000);
}

update();
</script>

</body>
</html>
